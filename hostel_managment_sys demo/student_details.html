<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="stu_details_style.css">
</head>
<body>
    <div class="titlenav">STUDENT DETAILS</div>
    <div class="short" style="margin-left: 75px; margin-right: 75px;">
        <div class="secondnav">
            <div class="info1">
                <div class="name" style="display: flex;">
                    <h3 >NAME: </h3>
                    <input type="text" style="height: 39px; width: 100%; font-size: large;border: none; align-self: center; " placeholder="Enter name" >
                </div>
                <div class="room" style="display: flex;">
                    <h3 >ROOM NO. : </h3>
                    <input type="text" style="height: 39px; width: 100%; font-size: large;border: none; align-self: center; " placeholder="Enter Room no." >
                </div>
               
                <div class="phone" style="display: flex;">
                    <h3>Contact no: </h3>
                    <input type="text" style="height: 39px; width: 100%; font-size: large;border: none; align-self: center; " placeholder="Enter contact no." >
                </div>
                <div class="course" style="display: flex;">
                    <h3>Course : </h3>
                    <input type="text" style="height: 39px; width: 100%; font-size: large;border: none; align-self: center; " placeholder="Enter Course" >
                </div>
                <div class="rollno" style="display: flex;">
                    <h3>ROLL NO. : </h3>
                    <input type="text" style="height: 39px; width: 100%; font-size: large;border: none; align-self: center; " placeholder="Enter ADMINSSION NO." >
                </div>
                <div class="email" style="display: flex;">
                    <h3>Email id : </h3>
                    <input type="text" style="height: 39px; width: 100%; font-size: large;border: none; align-self: center; " placeholder="Enter Institute Email id" >
                </div>
                <div class="branch" style="display: flex;">
                    <h3>Branch : </h3>
                    <input type="text" style="height: 39px; width: 100%; font-size: large;border: none; align-self: center; " placeholder="Enter Branch" >
                </div>
                
            </div>
            <div class="pic"><img src="Umang.jpg" alt="student photo"></div>
        </div>
        <h2>
            PERSONAL DETAILS:-
            <br>
        </h2>
        <div class="thirdnav">
            <div class="info2" style="margin-left: 10px;">
                <div class="gender" style="display: flex;">
                    <h3>Gender : </h3>
                    <input type="text" style="height: 39px; width: 100%; font-size: large;border: none; align-self: center; " placeholder="Enter gender" >
                </div>
                <div class="dob" style="display: flex;">
                    <h3>Date of Birth : </h3>
                    <input type="text" style="height: 39px; width: 100%; font-size: large;border: none; align-self: center; " placeholder="Enter Date of Birth" >
                </div>
                <div class="blood" style="display: flex;">
                    <h3>Blood group : </h3>
                    <input type="text" style="height: 39px; width: 100%; font-size: large;border: none; align-self: center; " placeholder="Enter Blood group" >
                </div>
                
                <div class="address" style="display: flex;height: 17%;">
                    <h3>Address: </h3>
                    <input type="text" style="height: 39px; width: 100%; font-size: large;border: none; align-self: center; " placeholder="Enter address" >
                </div>
                <div class="Parent" style="display: flex;">
                    <h3 style="width: 25%;">Parent contact no.: </h3>
                    <input type="text" style="height: 39px; width: 100%; font-size: large;border: none; align-self: center; " placeholder="Enter Parent Contact number" >
                </div>
                
            </div>
    </div>
    
</body>
