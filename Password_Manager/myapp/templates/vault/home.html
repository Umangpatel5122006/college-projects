<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credential Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f9;
            color: #333;
            transition: background-color 3s ease-in-out;
        }
        h1 {
            color: #4CAF50;
        }
        a {
            text-decoration: none;
            color: #007BFF;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
            color: #0056b3;
        }
        body:hover {
            background-color: #ADD8E6;
        }
        form {
            margin-top: 20px;
        }
        input[type="text"] {
            padding: 0.5rem;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 0.5rem 1rem;
            font-size: 1rem;
            color: white;
            background-color: #4CAF50;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
    </style>
</head>
<body>
    <!-- <h1>Welcome to the Credential Manager</h1>
    <p>Go to <a href="/add/">Add</a> or <a href="/search/">Search</a></p>

    
    <form method="get" action="{% url 'search' %}">
        <input type="text" name="q" placeholder="Search credentials..." required>
        <button type="submit">Search</button>
    </form> -->
    <h1>Welcome to the Credential Manager</h1>
    {% if user.is_authenticated %}
        <p>Hello, {{ user.username }}! <a href="{% url 'logout' %}">Log Out</a></p>
    {% else %}
        <p><a href="{% url 'login' %}">Log In</a> or <a href="{% url 'signup' %}">Sign Up</a></p>
    {% endif %}
    <p>Go to <a href="/add/">Add</a> or <a href="/search/">Search</a></p>
</body>
</html>
