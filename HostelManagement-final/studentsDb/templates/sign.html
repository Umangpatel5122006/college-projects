<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <!-- <link rel="stylesheet" href="sign.css"> -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">  
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --gradient-start: #667eea;
            --gradient-end: #764ba2;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --text-dark: #2c3e50;
            --text-light: #ecf0f1;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
    
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            overflow-x: hidden;
        }
    
        /* Enhanced Alert Styling */
        .alert {
            position: fixed;
            top: 20px;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.9);
            color: var(--accent-color);
            font-weight: 600;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            animation: slideIn 0.5s ease-out;
            z-index: 1000;
        }
    
        .alert::before {
            content: '⚠️';
            font-size: 1.2rem;
        }
    
        /* Modern Glass Container */
        .container {
            width: 850px;
            height: 480px;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            transform: scale(0.95);
            opacity: 0;
            animation: scaleUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    
        /* Login Form Styling */
        .login-box {
            width: 55%;
            padding: 3rem 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }
    
        .login-box h2 {
            margin-bottom: 2rem;
            font-size: 2.4rem;
            color: var(--text-dark);
            font-weight: 700;
            text-align: center;
            position: relative;
        }
    
        .login-box h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--gradient-end);
            border-radius: 2px;
        }
    
        .input-box {
            margin: 1.2rem 0;
            position: relative;
        }
    
        .input-box input {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.8);
            color: var(--text-dark);
            font-size: 1rem;
            transition: var(--transition);
        }
    
        .input-box input:focus {
            outline: none;
            border-color: var(--gradient-start);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
        }
    
        /* Enhanced Button Styling */
        .btn {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: var(--text-light);
            font-size: 1.1rem;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
    
        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255,255,255,0.3), 
                transparent);
            transition: 0.5s;
        }
    
        .btn:hover::after {
            left: 100%;
        }
    
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
    
        /* Signup Link Styling */
        .signup-text {
            margin-top: 1.5rem;
            text-align: center;
            color: var(--text-dark);
        }
    
        .signup-text a {
            color: var(--gradient-end);
            text-decoration: none;
            font-weight: 600;
            position: relative;
        }
    
        .signup-text a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient-end);
            transition: var(--transition);
        }
    
        .signup-text a:hover::after {
            width: 100%;
        }
    
        /* Welcome Section Styling */
        .welcome-box {
            width: 45%;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
    
        .welcome-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, 
                transparent, 
                rgba(255,255,255,0.1), 
                transparent);
            transform: rotate(45deg);
            animation: shine 6s infinite;
        }
    
        .welcome-box h2 {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.4;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    
        /* Animations */
        @keyframes scaleUp {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    
        @keyframes slideIn {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    
        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
    
        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                width: 90%;
                height: auto;
                flex-direction: column;
            }
    
            .login-box, .welcome-box {
                width: 100%;
                padding: 2.5rem 1.5rem;
            }
    
            .welcome-box {
                padding: 3rem 1.5rem;
            }
    
            .login-box h2 {
                font-size: 2rem;
            }
    
            .welcome-box h2 {
                font-size: 1.8rem;
            }
        }
    
        @media (max-width: 480px) {
            .login-box {
                padding: 2rem 1rem;
            }
    
            .input-box input {
                padding: 0.8rem 1.2rem;
            }
    
            .btn {
                padding: 0.8rem;
                font-size: 1rem;
            }
        }
    </style>  
</head>
<body>
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <div class="container">
        <div class="login-box">
            <h2>Login</h2>
            <form method="post" action="{% url 'student-login' %}"> 
                {% csrf_token %}               
                <div class="input-box">
                    <input type="text" placeholder="Username" required name ='username'>
                </div>
                <div class="input-box">
                  <input type="email" placeholder="Institute Email-id" required name = 'email'>
              </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required name = 'password'>
                </div>
                <button type="submit" class="btn">Login</button>
                <p class="signup-text">Click here for <a href="/admin/login/">admin</a> login</p>
            </form>
        </div>
        <div class="welcome-box">
            <h2>WELCOME TO SVNIT HOSTEL SYSTEM</h2>
            
        </div>
    </div>
    {% if error %}
    <script>
        alert("Invalid Credentials");
    </script>
    {%endif%}

    {% if success %}
    <script>
        alert("Login Succesfull");
        window.location.href= "{% url 'home' %}"
    </script>
    {%endif%}
</body>
</html>
